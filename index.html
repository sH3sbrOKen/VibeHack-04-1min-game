<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今天不想回消息</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #E5E5EA;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

#game {
  width: 100%;
  max-width: 390px;
  height: 100svh;
  max-height: 844px;
  background: #EDEDED;
  position: relative;
  overflow: hidden;
  user-select: none;
}

/* ── START SCREEN ── */
#start-screen {
  position: absolute;
  inset: 0;
  background: #F2F2F7;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  gap: 0;
  overflow-y: auto;
}

.start-battery {
  font-size: 64px;
  margin-bottom: 12px;
  animation: batteryPulse 1.2s infinite;
}

@keyframes batteryPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.start-title {
  font-size: 24px;
  font-weight: 700;
  color: #000;
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: -0.3px;
}

.start-sub {
  font-size: 15px;
  color: #8E8E93;
  text-align: center;
  line-height: 1.9;
  margin-bottom: 24px;
}

.start-sub em {
  color: #FF3B30;
  font-style: normal;
  font-weight: 600;
}

.start-sub-note {
  color: #AEAEB2;
  font-size: 13px;
}

.start-hint {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
  justify-content: center;
}

.hint-chip {
  background: #E5E5EA;
  border-radius: 14px;
  padding: 6px 12px;
  font-size: 13px;
  color: #3C3C43;
}

#start-btn {
  padding: 15px 52px;
  background: #007AFF;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.1s;
}

#start-btn:active { opacity: 0.75; }

#demo-btn {
  margin-top: 12px;
  padding: 11px 32px;
  background: none;
  color: #8E8E93;
  border: 1px solid #C7C7CC;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.1s;
}
#demo-btn:active { opacity: 0.6; }

/* ── TOP BAR — iOS nav bar ── */
#topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(249,249,249,0.94);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid rgba(0,0,0,0.15);
  z-index: 10;
}

#battery-display {
  display: flex;
  align-items: center;
  gap: 4px;
  color: #FF3B30;
  font-size: 12px;
  font-weight: 600;
  animation: batteryBlink 1.5s infinite;
}

@keyframes batteryBlink {
  0%, 70%, 100% { opacity: 1; }
  80% { opacity: 0.25; }
}

.batt-icon {
  width: 22px;
  height: 11px;
  border: 1.5px solid #FF3B30;
  border-radius: 2px;
  position: relative;
  display: flex;
  align-items: center;
  padding: 1.5px;
}

.batt-icon::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 2.5px;
  height: 5px;
  background: #FF3B30;
  border-radius: 0 1px 1px 0;
}

.batt-fill {
  width: 2px;
  height: 100%;
  background: #FF3B30;
  border-radius: 1px;
}

#msg-badge {
  background: #FF3B30;
  color: white;
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}

#timer {
  font-size: 22px;
  font-weight: 700;
  color: #000;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

#timer.urgent { color: #FF3B30; animation: timerPulse 0.4s infinite; }

@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── INTRUSION: 异世界乱入视觉（共用基础） ── */
#game.intrusion-active {
  transition: background 0.4s;
}

/* ── 苏联女孩：绿色电波 ── */
#game.intrusion-radio {
  background: #0a0a0f;
}
#game.intrusion-radio #topbar {
  background: rgba(0,10,5,0.94);
  border-bottom-color: rgba(0,255,157,0.2);
}
#game.intrusion-radio #timer,
#game.intrusion-radio #msg-badge {
  color: #00ff9d;
}
#game.intrusion-radio::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,157,0.03) 3px, rgba(0,255,157,0.03) 4px);
  pointer-events: none;
  z-index: 25;
  animation: scanlines 8s linear infinite;
}
#game.intrusion-radio #stats-bar {
  background: rgba(0,10,5,0.9);
}
#game.intrusion-radio .intrusion-card {
  background: #0d1117 !important;
  border: 1px solid rgba(0,255,157,0.6) !important;
  box-shadow: 0 0 20px rgba(0,255,157,0.15), 0 0 40px rgba(0,255,157,0.05) !important;
  animation: cardIn 0.25s cubic-bezier(0.34,1.56,0.64,1), glitch 4s infinite !important;
}
#game.intrusion-radio .intrusion-card .msg-sender {
  color: rgba(0,255,157,0.5) !important;
  letter-spacing: 2px;
}
#game.intrusion-radio .intrusion-card .msg-body {
  color: #00ff9d !important;
  font-family: 'Courier New', monospace !important;
  letter-spacing: 0.5px;
}

/* ── 伪人：红色警报 ── */
#game.intrusion-android {
  background: #0f0a0a;
}
#game.intrusion-android #topbar {
  background: rgba(15,5,5,0.96);
  border-bottom-color: rgba(255,51,51,0.2);
}
#game.intrusion-android #timer,
#game.intrusion-android #msg-badge {
  color: #ff3333;
}
#game.intrusion-android #stats-bar {
  background: rgba(15,5,5,0.9);
}
#game.intrusion-android .btn-corner {
  opacity: 0.3;
}
#game.intrusion-android .intrusion-card {
  background: #1a0a0a !important;
  border: 1px solid #ff3333 !important;
  box-shadow: 0 0 20px rgba(255,51,51,0.15) !important;
  animation: cardIn 0.25s cubic-bezier(0.34,1.56,0.64,1), androidBlink 0.4s infinite !important;
}
#game.intrusion-android .intrusion-card .msg-sender {
  color: rgba(255,51,51,0.6) !important;
  letter-spacing: 2px;
}
#game.intrusion-android .intrusion-card .msg-body {
  color: #ff3333 !important;
  font-family: 'Courier New', monospace !important;
  letter-spacing: 0.5px;
}
#game.intrusion-android {
  animation: shake 0.15s infinite;
}

@keyframes scanlines {
  0%   { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

@keyframes glitch {
  0%, 90%, 100% { filter: none; transform: none; }
  91% { filter: hue-rotate(90deg) brightness(1.2); transform: translateX(2px); }
  92% { filter: hue-rotate(-90deg); transform: translateX(-2px); }
  93% { filter: none; transform: none; }
  96% { filter: brightness(1.5); transform: translateY(1px); }
  97% { filter: none; transform: none; }
}

@keyframes androidBlink {
  0%, 49% { border-color: #ff3333 !important; }
  50%, 100% { border-color: rgba(255,51,51,0.2) !important; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(2px); }
  75%       { transform: translateX(-2px); }
}

#skip-btn {
  display: none;
  background: none;
  border: none;
  font-size: 12px;
  color: #8E8E93;
  padding: 4px 6px;
  cursor: pointer;
  border-radius: 6px;
  -webkit-tap-highlight-color: transparent;
}
#skip-btn:active { background: rgba(0,0,0,0.06); }

/* ── STATS BAR ── */
#stats-bar {
  position: absolute;
  top: 56px;
  left: 0; right: 0;
  padding: 6px 10px;
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  z-index: 8;
  background: rgba(249,249,249,0.9);
  border-bottom: 0.5px solid rgba(0,0,0,0.1);
}

.stat-chip {
  font-size: 11px;
  color: #8E8E93;
  background: #E5E5EA;
  padding: 3px 8px;
  border-radius: 8px;
  transition: color 0.3s, background 0.3s, opacity 0.4s, transform 0.4s;
  opacity: 0;
  transform: translateY(-4px);
  pointer-events: none;
}

.stat-chip.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.stat-chip.alert {
  color: #FF3B30;
  background: #FFE5E3;
}

/* ── BUTTONS ── */
.reply-btn {
  position: absolute;
  width: 84px;
  height: 84px;
  border: none;
  border-radius: 50%;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  z-index: 30;
  transition: transform 0.08s, box-shadow 0.08s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.reply-btn:active {
  transform: scale(0.86) !important;
  box-shadow: none !important;
}

#btn-wait        { top: 118px; left: 16px;  background: #FF9500; color: #fff; box-shadow: 0 4px 14px rgba(255,149,0,0.4); }
#btn-received    { top: 118px; right: 16px; background: #007AFF; color: #fff; box-shadow: 0 4px 14px rgba(0,122,255,0.4); }
#btn-unsubscribe { bottom: 72px; left: 16px;  background: #FF3B30; color: #fff; box-shadow: 0 4px 14px rgba(255,59,48,0.4); }
#btn-love        { bottom: 72px; right: 16px; background: #34C759; color: #fff; box-shadow: 0 4px 14px rgba(52,199,89,0.4); }

/* ── MESSAGE CARD — WeChat received bubble ── */
#msg-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 72%;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg-card {
  background: #fff;
  border-radius: 18px;
  border-top-left-radius: 4px;
  padding: 14px 16px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
  transition: opacity 0.15s, transform 0.15s;
}

.msg-card.active-card  { opacity: 1; transform: scale(1); }
.msg-card.stacked-card { opacity: 0.55; transform: scale(0.96); pointer-events: none; }
.msg-card.stacked-card:nth-of-type(3) { opacity: 0.3; transform: scale(0.93); }
.msg-card.stacked-card:nth-of-type(4) { opacity: 0.15; transform: scale(0.90); }
.msg-more { font-size: 11px; color: #aaa; text-align: center; margin-top: 2px; }

.msg-card.in      { animation: cardIn    0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
.msg-card.out     { animation: cardOut  0.18s ease-in  forwards; }
.msg-card.correct { animation: cardPop  0.22s ease-out forwards; }

@keyframes cardIn    { from { opacity: 0; transform: scale(0.88) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes cardOut   { to   { opacity: 0; transform: scale(0.92) translateY(-12px); } }
@keyframes cardPop   { 0% { opacity:1; transform: scale(1) translateY(0); } 40% { opacity:1; transform: scale(1.06) translateY(-8px); } 100% { opacity:0; transform: scale(0.9) translateY(-40px); } }

.msg-sender {
  font-size: 12px;
  font-weight: 500;
  color: #8E8E93;
  margin-bottom: 6px;
}

.msg-body {
  font-size: 17px;
  font-weight: 400;
  color: #000;
  line-height: 1.45;
}

/* ── FLOATING TEXT ── */
.float-txt {
  position: absolute;
  font-size: 13px;
  font-weight: 700;
  color: #FF3B30;
  pointer-events: none;
  z-index: 60;
  white-space: nowrap;
  animation: floatUp 0.9s ease-out forwards;
}

.float-txt.positive { color: #34C759; }

@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  30%  { opacity: 1; transform: translateY(-20px) scale(1.1); }
  100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
}

/* ── END SCREEN — light ── */
#end-screen {
  position: absolute;
  inset: 0;
  background: #F2F2F7;
  z-index: 150;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 36px 16px 24px;
  overflow-y: auto;
}

#end-screen.show { display: flex; }

.end-title { font-size: 20px; font-weight: 700; color: #000; margin-bottom: 4px; }
.end-sub   { font-size: 13px; color: #8E8E93; margin-bottom: 20px; }

.result-row {
  width: 100%;
  background: #fff;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.result-row:first-of-type { border-radius: 12px 12px 2px 2px; }
.result-row:last-of-type  { border-radius: 2px 2px 12px 12px; margin-bottom: 8px; }

.result-row.unlocked { background: #FFF1F0; }

.result-left { flex: 1; }
.result-name { font-size: 14px; color: #3C3C43; }
.result-name.red { color: #FF3B30; }
.result-unlock {
  font-size: 11px;
  color: #FF3B30;
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.result-unlock::before { content: '▶'; font-size: 9px; }
.result-val { font-size: 15px; font-weight: 600; color: #000; }
.sentence-block { display: block; padding: 14px 16px; }
.sentence-line { font-size: 13px; color: #3C3C43; line-height: 1.8; }
.sentence-line.red { color: #FF3B30; }

#share-card {
  width: 100%;
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  color: #8E8E93;
  line-height: 1.8;
  text-align: center;
  margin-bottom: 4px;
}

#restart-btn {
  margin-top: 16px;
  padding: 14px 44px;
  background: #007AFF;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.1s;
}

#restart-btn:active { opacity: 0.75; }

/* ── CONGRATS MODAL ── */
#congrats-modal {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 180;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  animation: modalBgIn 0.3s ease;
}

#congrats-modal.show { display: flex; }

@keyframes modalBgIn { from { opacity: 0; } to { opacity: 1; } }

#congrats-card {
  background: #fff;
  border-radius: 20px;
  padding: 32px 24px 24px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  animation: cardRise 0.35s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes cardRise { from { opacity:0; transform: scale(0.85) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }

.congrats-icon { font-size: 48px; margin-bottom: 14px; }
.congrats-title { font-size: 22px; font-weight: 700; color: #000; margin-bottom: 4px; }
.congrats-sub   { font-size: 13px; color: #8E8E93; margin-bottom: 20px; }
.congrats-body  { font-size: 15px; color: #3C3C43; line-height: 1.7; margin-bottom: 24px; }
.congrats-muted { font-size: 13px; color: #C7C7CC; }

.congrats-btn {
  width: 100%;
  padding: 14px;
  background: #007AFF;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.1s;
}

.congrats-btn:active { opacity: 0.75; }

/* ── ENDING CARD ── */
.ending-card {
  width: 100%;
  background: #fff;
  border-radius: 16px;
  padding: 20px 16px;
  margin-bottom: 12px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.ending-icon { font-size: 36px; margin-bottom: 8px; }
.ending-title { font-size: 18px; font-weight: 700; color: #000; margin-bottom: 6px; }
.ending-text { font-size: 14px; color: #3C3C43; line-height: 1.7; }

.ending-progress {
  width: 100%;
  text-align: center;
  font-size: 13px;
  color: #8E8E93;
  padding: 12px 0 4px;
}

.enter-storyline-btn {
  padding: 8px 16px;
  background: #007AFF;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}

.enter-storyline-btn:active { opacity: 0.75; }

/* ── CORRECT FLASH ── */
#correct-flash {
  position: absolute;
  inset: 0;
  background: rgba(52,199,89,0.1);
  pointer-events: none;
  opacity: 0;
  z-index: 5;
  transition: opacity 0.1s;
}

/* ── IMPORT MODAL ── */
#import-btn { margin-top: 8px; background: none; border: 1px solid #ccc; color: #888; font-size: 13px; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
#import-btn:active { background: rgba(0,0,0,0.05); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 299; }
.modal-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fff; border-radius: 16px; padding: 24px; width: 300px; z-index: 300; display: flex; flex-direction: column; gap: 12px; }
.modal-title { font-size: 16px; font-weight: 600; color: #1c1c1e; }
.modal-hint { font-size: 12px; color: #888; line-height: 1.5; }
#import-textarea { height: 160px; resize: none; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 13px; line-height: 1.6; font-family: inherit; outline: none; }
#import-textarea:focus { border-color: #aaa; }
.import-error { font-size: 12px; color: #e55; min-height: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button { padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #ddd; background: #f5f5f5; color: #333; }
.modal-actions .btn-primary { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
</style>
</head>
<body>
<div id="game">

  <!-- Start -->
  <div id="start-screen">
    <div class="start-battery">🪫</div>
    <div class="start-title">今天不想回消息</div>
    <div class="start-sub">
      昨晚有停电通知。你没看到。<br><br>
      醒来已经晚了，手机剩 <em>1%</em> 电。<br>
      老板在催，同事在问，快递等你开门禁，<br>
      你用 claw 自动订的早饭和咖啡刚到楼下，<br>
      还有几个你叫不出名字但号码眼熟的来电。<br><br>
      预存了四条回复。<br>
      在找到充电器之前，先用它们把消息处理完。<br><br>
      <span class="start-sub-note">（应该够用的。）</span>
    </div>
    <button id="start-btn" onclick="startGame()">开始一分钟</button>
    <button id="demo-btn" onclick="startDemoMode()">VibeHack04 路演模式</button>
    <button id="import-btn" onclick="showImportModal()">导入我的消息</button>
  </div>

  <!-- Audio -->
  <audio id="bgm-main"      src="music/bgm-main.wav"      loop preload="auto"></audio>
  <audio id="bgm-start"     src="music/bgm-start.wav"     loop preload="auto"></audio>
  <audio id="bgm-soviet"    src="music/bgm-soviet.wav"    loop preload="auto"></audio>
  <audio id="bgm-spacetime" src="music/bgm-spacetime.wav" loop preload="auto"></audio>
  <audio id="bgm-android"   src="music/bgm-android.wav"   loop preload="auto"></audio>
  <audio id="sfx-msg"               src="music/sfx-msg.wav"               preload="auto"></audio>
  <audio id="sfx-correct"           src="music/sfx-correct.wav"           preload="auto"></audio>
  <audio id="sfx-wrong"             src="music/sfx-wrong.wav"             preload="auto"></audio>
  <audio id="sfx-intrusion-radio"   src="music/sfx-intrusion-radio.wav"   preload="auto"></audio>
  <audio id="sfx-intrusion-android" src="music/sfx-intrusion-android.wav" preload="auto"></audio>

  <!-- Import Modal -->
  <div id="import-modal" style="display:none">
    <div class="modal-overlay" onclick="hideImportModal()"></div>
    <div class="modal-box">
      <div class="modal-title">导入消息记录</div>
      <div class="modal-hint">每行一条，格式：发信人：消息内容</div>

  PARTNER:'LOVE', FAMILY:'LOVE', FRIEND:'LOVE',
  SYSTEM:'RECEIVED', SPAM:'UNSUBSCRIBE', SUBSCRIPTION:'UNSUBSCRIBE'
};

// ── BODY OVERRIDE RULES ──
const RULES = [
  { test:(b,t)=>/(放你门口|已放前台|已投递)/.test(b),                         reply:'RECEIVED' },
  { test:(b,t)=>/点击链接/.test(b)&&/(奖励|退款|验证)/.test(b),              reply:'UNSUBSCRIBE' },
  { test:(b,t)=>/验证码/.test(b)&&t==='SPAM',                                reply:'UNSUBSCRIBE' },
  { test:(b,t)=>/(已自动续费|已扣费)/.test(b),                                reply:'RECEIVED' },
  { test:(b,t)=>t==='BOSS'&&/(辛苦了|没事)/.test(b),                         reply:'RECEIVED' },
  { test:(b,t)=>t==='FAMILY'&&/(转给你|够不够用)/.test(b),                   reply:'RECEIVED' },
];

let activeStatCfg = null, activeDefaults = null, activeRules = null;

function correctReply(senderType, body) {
  const rules = activeRules || RULES;
  const defaults = activeDefaults || DEFAULTS;
  for (const r of rules) if (r.test(body, senderType)) return r.reply;
  return defaults[senderType];
}

function generateCards(count) {
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const cards = [];
  // DELIVERY/COURIER 权重减半，其余均等
  const typeWeights = [
    'BOSS','BOSS','SPAM','SPAM','SUBSCRIPTION','SUBSCRIPTION',
    'SYSTEM','SYSTEM','PARTNER','PARTNER','FAMILY','FAMILY','FRIEND','FRIEND',
    'DELIVERY','COURIER',
  ];
  const types = typeWeights;
  for (let i = 0; i < count; i++) {
    const st = pick(types);
    const tpl = pick(TMPL[st]);
    let body = tpl.tpl;
    if (tpl.vars) {
      for (const [k,pool] of Object.entries(tpl.vars)) {
        body = body.replace('{'+k+'}', pick(pool));
      }
    }
    cards.push({
      t: st, n: pick(TMPL_NAMES[st]), b: body,
      e: {...TMPL_DEFAULT_EFFECTS[st]}, d: 1,
    });
  }
  return cards;
}

/* ===== STATE: 游戏状态变量 ===== */
let stats, timeLeft, tik, cur, canClick, replied, revealedStats, handled;
let pool1, pool2, pool3;
let guidanceQueue = [];
let msgQueue = [];
let msgPushInterval = 3; // 每N秒自动推一条消息
let currentStoryline = null;
let escapeType = null;
let intrusionActive = false;
let intrusionTriggered = false;
let intrusionConfig = null;
let intrusionCardIndex = 0;
let demoMode = false;
let demoSequence = [
  { id: 'MAIN' },
  { id: 'SCAM_TARGET' },
  { id: 'MAIN', intrusion: 'SCAM_TARGET' },
  { id: 'SPACETIME_RADIO', intrusion: 'SPACETIME_RADIO' },
];
let demoIndex = 0;
let replyLog = [];

/* ===== GAME FLOW: 开始 → 消息 → 回复 → 结算 ===== */
function startGame(storylineId) {
  storylineId = storylineId || 'MAIN';
  currentStoryline = STORYLINES[storylineId] || STORYLINES.MAIN;

  activeStatCfg = currentStoryline.statCfg || STAT_CFG;
  activeDefaults = currentStoryline.defaults || DEFAULTS;
  activeRules = currentStoryline.rules || RULES;
  escapeType = null;
  replyLog = [];
  const demoIntrusionKey = demoMode ? (demoSequence[demoIndex]?.intrusion || null) : null;
  intrusionConfig = demoMode
    ? (demoIntrusionKey ? (INTRUSIONS[demoIntrusionKey] || null) : null)
    : (INTRUSIONS[storylineId] || null);
  intrusionActive = false;
  intrusionTriggered = false;
  intrusionCardIndex = 0;

  if (currentStoryline.intro) {
    showIntroScreen(currentStoryline);
    return;
  }
  startGameCore();
}

function showIntroScreen(sl) {
  playBgm('bgm-start');
  const screen = document.getElementById('start-screen');
  screen.querySelector('.start-battery').textContent = sl.ui?.introIcon || '🪫';
  screen.querySelector('.start-title').textContent = sl.name;
  screen.querySelector('.start-sub').innerHTML = sl.intro.replace(/\n/g,'<br>');
  const hintEl = screen.querySelector('.start-hint');
  if (hintEl) hintEl.style.display = 'none';
  const btn = document.getElementById('start-btn');
  btn.textContent = '开始一分钟';
  btn.onclick = () => startGameCore();
  screen.style.display = 'flex';
}

// ── 音量配置（统一在此调整）──
const BGM_VOL = 0.4;   // 主线/故事线 BGM 音量，范围 0~1
const BGM_INTRUSION_VOL = 0.5;  // 乱入 BGM 音量（稍突出）

const ALL_BGM_IDS = ['bgm-main','bgm-start','bgm-soviet','bgm-spacetime','bgm-android'];

function playBgm(id, vol) {
  ALL_BGM_IDS.forEach(bid => {
    const el = document.getElementById(bid);
    if (el) { el.pause(); el.currentTime = 0; }
  });
  const el = document.getElementById(id);
  if (el) { el.volume = vol !== undefined ? vol : BGM_VOL; el.play().catch(()=>{}); }
}
function stopBgm() {
  ALL_BGM_IDS.forEach(bid => {
    const el = document.getElementById(bid);
    if (el) { el.pause(); el.currentTime = 0; }
  });
}

const SFX_VOL = 0.6;
function playSfx(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.volume = SFX_VOL;
  el.currentTime = 0;
  el.play().catch(() => {});
}

function startGameCore() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').className = '';
  document.getElementById('skip-btn').style.display = demoMode ? 'block' : 'none';

  stats = Object.fromEntries(Object.entries(activeStatCfg).map(([k,v])=>[k,v.init]));
  revealedStats = new Set();
  timeLeft = currentStoryline.duration || 60;
  replied = 0;
  handled = 0;
  canClick = false;

  rebuildStatChips(activeStatCfg);

  if (currentStoryline.ui?.buttons) {
    const bm = currentStoryline.ui.buttons;
    if (bm.WAIT) document.getElementById('btn-wait').textContent = bm.WAIT;
    if (bm.RECEIVED) document.getElementById('btn-received').textContent = bm.RECEIVED;
    if (bm.UNSUBSCRIBE) document.getElementById('btn-unsubscribe').textContent = bm.UNSUBSCRIBE;
    if (bm.LOVE) document.getElementById('btn-love').textContent = bm.LOVE;
  } else {
    document.getElementById('btn-wait').textContent = '等等';
    document.getElementById('btn-received').textContent = '收到';
    document.getElementById('btn-unsubscribe').textContent = '退订';
    document.getElementById('btn-love').textContent = '好的亲';
  }

  if (currentStoryline.ui?.batteryText) {
    document.getElementById('battery-display').lastChild.textContent = currentStoryline.ui.batteryText;
  } else {
    document.getElementById('battery-display').lastChild.textContent = '1%';
  }

  buildPools();
  renderStats();
  updateTimer();
  document.getElementById('msg-badge').textContent = '99+';
  msgQueue = [];

  clearInterval(tik);
  tik = setInterval(tick, 1000);
  playBgm(currentStoryline.id === 'SPACETIME_RADIO' ? 'bgm-spacetime' : 'bgm-main');
  pushNextCard();
  pushNextCard();
}

function rebuildStatChips(cfg) {
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = '';
  if (Object.keys(cfg).length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = '';
  Object.entries(cfg).forEach(([k, c]) => {
    const chip = document.createElement('span');
    chip.className = 'stat-chip';
    chip.id = 'sc-' + k;
    chip.textContent = c.label.slice(0,2) + ' ' + (c.unit||'') + c.init;
    bar.appendChild(chip);
  });
  const hChip = document.createElement('span');
  hChip.className = 'stat-chip';
  hChip.id = 'sc-HANDLED';
  hChip.textContent = '处理 0';
  bar.appendChild(hChip);
}

function buildPools() {
  const shuffle = arr => arr.sort(()=>Math.random()-0.5);
  const sl = currentStoryline;
  const rawCards = sl.raw ? sl.raw.map(m=>({...m, correct:correctReply(m.t,m.b)})) : MSGS;
  const gc = sl.genCount || 40;
  const genExtra = sl.tmpl
    ? generateCardsForStoryline(sl, gc).map(m=>({...m, correct:correctReply(m.t,m.b)}))
    : generateCards(gc).map(m=>({...m, correct:correctReply(m.t,m.b)}));
  const all = [...rawCards, ...genExtra];
  pool1 = shuffle(all.filter(m=>m.d===1));
  pool2 = shuffle(all.filter(m=>m.d===2));
  pool3 = shuffle(all.filter(m=>m.d===3));
  guidanceQueue = (sl.guidance || []).map(g => ({...g}));
}

function generateCardsForStoryline(sl, count) {
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const cards = [];
  const types = Object.keys(sl.tmpl);
  if (types.length === 0) return cards;
  for (let i = 0; i < count; i++) {
    const st = pick(types);
    const templates = sl.tmpl[st];
    if (!templates || templates.length === 0) continue;
    const tpl = pick(templates);
    let body = tpl.tpl;
    if (tpl.vars) {
      for (const [k,pool] of Object.entries(tpl.vars)) {
        body = body.replace('{'+k+'}', pick(pool));
      }
    }
    cards.push({
      t: st,
      n: pick((sl.tmplNames||{})[st] || [st]),
      b: body,
      e: {...((sl.tmplEffects||{})[st] || {})},
      d: 1,
    });
  }
  return cards;
}

function pickFromPool(pool) {
  if (pool.length === 0) return null;
  const idx = Math.floor(Math.random()*pool.length);
  return pool.splice(idx, 1)[0];
}

function tick() {
  timeLeft--;
  updateTimer();
  if (timeLeft <= 0) { clearInterval(tik); endGame(); return; }
  if (timeLeft === 45 && intrusionConfig && !intrusionActive && !intrusionTriggered) startIntrusion();
  if (timeLeft === 35 && intrusionActive) { endIntrusion(); return; }
  // 自动推消息：非乱入时按间隔压入新卡
  if (!intrusionActive) {
    const interval = timeLeft > 30 ? 3 : timeLeft > 15 ? 2 : 1;
    if ((60 - timeLeft) % interval === 0 || msgQueue.length === 0) {
      pushNextCard();
    }
  }
}

function startIntrusion() {
  intrusionActive = true;
  intrusionCardIndex = 0;
  msgQueue = []; // 乱入期间清空普通消息队列
  const gameEl = document.getElementById('game');
  gameEl.classList.add('intrusion-active');
  const isAndroid = intrusionConfig.id === 'ANDROID_INTRUSION';
  gameEl.classList.add(isAndroid ? 'intrusion-android' : 'intrusion-radio');
  playSfx(isAndroid ? 'sfx-intrusion-android' : 'sfx-intrusion-radio');
  playBgm(isAndroid ? 'bgm-android' : 'bgm-soviet', BGM_INTRUSION_VOL);
  showIntrusionCard(0);
}

function showIntrusionCard(index) {
  const card = intrusionConfig.cards[index];
  cur = { t: '__INTRUSION__', n: card.senderName, b: card.body, correct: intrusionConfig.activateReply, e: {} };
  canClick = true;
  document.getElementById('msg-area').innerHTML =
    `<div class="msg-card intrusion-card in">
       <div class="msg-sender">${card.senderName}</div>
       <div class="msg-body">${card.body.replace(/\n/g,'<br>')}</div>
     </div>`;
}

function endIntrusion() {
  intrusionActive = false;
  const gameEl = document.getElementById('game');
  gameEl.classList.remove('intrusion-active', 'intrusion-radio', 'intrusion-android');
  // 切回当前故事线 BGM
  const bgmId = currentStoryline.id === 'SPACETIME_RADIO' ? 'bgm-spacetime' : 'bgm-main';
  playBgm(bgmId);
  cur = null;
  canClick = false;
  msgQueue = [];
  document.getElementById('msg-area').innerHTML = '';
  setTimeout(pushNextCard, 300);
}

function updateTimer() {
  const el = document.getElementById('timer');
  const s = timeLeft % 60;
  el.textContent = `${Math.floor(timeLeft/60)}:${String(s).padStart(2,'0')}`;
  el.className = timeLeft <= 10 ? 'urgent' : '';
}

function pickCard() {
  if (guidanceQueue.length > 0) return guidanceQueue.shift();
  let card = null;
  if (timeLeft > 45) {
    card = pickFromPool(pool1) || pickFromPool(pool2);
  } else if (timeLeft > 20) {
    card = (Math.random() < 0.6 ? pickFromPool(pool1) : pickFromPool(pool2)) || pickFromPool(pool1) || pickFromPool(pool2);
  } else {
    card = (Math.random() < 0.5 ? pickFromPool(pool2) : pickFromPool(pool3)) || pickFromPool(pool2) || pickFromPool(pool3) || pickFromPool(pool1);
  }
  if (!card) {
    const extra = generateCards(20).map(m => ({...m, correct: correctReply(m.t, m.b)}));
    extra.forEach(m => { if(m.d===1) pool1.push(m); else if(m.d===2) pool2.push(m); else pool3.push(m); });
    card = pickFromPool(pool1) || pickFromPool(pool2) || pickFromPool(pool3);
  }
  return card;
}

function pushNextCard() {
  if (timeLeft <= 0 || intrusionActive) return;
  if (msgQueue.length >= 6) return; // 最多堆6张
  const card = pickCard();
  if (!card) return;
  msgQueue.push(card);
  playSfx('sfx-msg');
  renderMsgArea();
  cur = msgQueue[msgQueue.length - 1];
  canClick = msgQueue.length > 0;
}

function renderMsgArea() {
  const area = document.getElementById('msg-area');
  area.innerHTML = '';
  const visible = msgQueue.slice(-4).reverse();
  visible.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'msg-card' + (i === 0 ? ' active-card' : ' stacked-card');
    el.dataset.idx = i;
    if (i === 0) el.classList.add('in');
    el.innerHTML = `<div class="msg-sender">${card.n}</div><div class="msg-body">${card.b}</div>`;
    area.appendChild(el);
  });
  if (msgQueue.length > 4) {
    const more = document.createElement('div');
    more.className = 'msg-more';
    more.textContent = `+${msgQueue.length - 4} 条`;
    area.appendChild(more);
  }
}

function nextMsg() {
  // 兼容 endIntrusion 调用
  pushNextCard();
}

function reply(r) {
  if (!canClick || !cur) return;
  canClick = false;

  if (intrusionActive) {
    if (intrusionConfig.activateReply === null) {
      // 伪人：任意按钮=记录激活，等10秒到期正常结算
      intrusionTriggered = true;
      endIntrusion();
    } else if (r === intrusionConfig.activateReply) {
      const isLast = intrusionCardIndex >= intrusionConfig.cards.length - 1;
      if (isLast) {
        intrusionTriggered = true;
        endIntrusion();
      } else {
        intrusionCardIndex++;
        showIntrusionCard(intrusionCardIndex);
      }
    } else {
      // 按了非收到=中断乱入，回原线，不激活
      endIntrusion();
    }
    return;
  }

  const correct = r === cur.correct;
  replyLog.push({ senderType:cur.t, reply:r, correct });

  // 动画：给队首卡加 out/correct class
  const topCard = document.querySelector('.active-card');

  if (cur.easter) {
    playSfx('sfx-correct');
    floatText('😄 对象会心一笑', true);
    if (topCard) topCard.classList.add('correct');
  } else if (!correct) {
    playSfx('sfx-wrong');
    if (topCard) topCard.classList.add('out');
    Object.entries(cur.e).forEach(([k, d]) => {
      if (!(k in stats)) return;
      stats[k] = Math.max(0, stats[k] + d);
      floatText(activeStatCfg[k].label + ' ' + (d > 0 ? '+' : '') + d, false);
      if (!revealedStats.has(k)) {
        revealedStats.add(k);
        const el = document.getElementById('sc-' + k);
        if (el) el.classList.add('visible');
      }
    });
    renderStats();
  } else {
    playSfx('sfx-correct');
    if (topCard) topCard.classList.add('correct');
    handled++;
    const hEl = document.getElementById('sc-HANDLED');
    if (hEl) {
      hEl.textContent = '处理 ' + handled;
      hEl.classList.add('visible');
    }
  }

  replied++;
  const remaining = Math.max(0, 99 - replied);
  document.getElementById('msg-badge').textContent = remaining > 0 ? String(remaining) : '✓';

  if (remaining === 0) {
    clearInterval(tik);
    canClick = false;
    setTimeout(showCongrats, 350);
    return;
  }

  // 定向移除已处理的卡，防止竞态 pop 弹错
  const processedCard = cur;
  setTimeout(() => {
    const idx = msgQueue.indexOf(processedCard);
    if (idx !== -1) msgQueue.splice(idx, 1);
    cur = msgQueue[msgQueue.length - 1] || null;
    canClick = msgQueue.length > 0;
    renderMsgArea();
  }, 200);
}

/* ===== UI EFFECTS: 动画与视觉反馈 ===== */
function flashCorrect() {
  const el = document.getElementById('correct-flash');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 100);
}

function floatText(text, pos) {
  const game = document.getElementById('game');
  const el = document.createElement('div');
  el.className = 'float-txt' + (pos ? ' positive' : '');
  el.textContent = text;
  el.style.left = (Math.random() * 55 + 20) + '%';
  el.style.top  = (Math.random() * 25 + 38) + '%';
  game.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function renderStats() {
  const cfg = activeStatCfg || STAT_CFG;
  Object.entries(stats).forEach(([k, v]) => {
    const el = document.getElementById('sc-' + k);
    if (!el || !cfg[k]) return;
    const c = cfg[k];
    const unit = c.unit || '';
    el.textContent = c.label.slice(0,2) + ' ' + unit + v;
    const revealed = revealedStats && revealedStats.has(k);
    const hit = c.dir === 'max' ? v >= c.thresh * 0.6 : v <= c.init * 0.4;
    el.className = 'stat-chip' + (revealed ? ' visible' : '') + (hit ? ' alert' : '');
  });
}

/* ===== ENDING & UNLOCK LOGIC ===== */
function resolveEnding(sl, st, h, r, et) {
  const endings = sl.endings || [];
  const matched = endings.filter(e => e.condition(st, h, r, replyLog, et)).sort((a,b) => b.priority - a.priority);
  if (matched.length === 0) return null;
  const top = matched[0].priority;
  const topEndings = matched.filter(e => e.priority === top);
  return topEndings[Math.floor(Math.random() * topEndings.length)];
}

function resolveEscapeType(sl) {
  if (!sl.escape) return null;
  const esc = sl.escape;
  if (esc.type === 'no_action') return replied === 0 ? 'escaped' : null;
  if (esc.type === 'stat') return (esc.op === '>=' ? (stats[esc.stat]||0) >= esc.value : (stats[esc.stat]||0) <= esc.value) ? 'escaped' : null;
  if (esc.type === 'handled') return handled >= esc.value ? 'escaped' : null;
  if (esc.type === 'custom' && typeof esc.fn === 'function') return esc.fn(stats, handled, replied, replyLog);
  return null;
}

function checkStorylineUnlocks() {
  const newly = [];
  Object.entries(STORYLINES).forEach(([id, sl]) => {
    if (id === 'MAIN' || unlockedStorylines[id]) return;
    const u = sl.unlock;
    if (!u) return;
    let met = false;
    if (u.type === 'stat') {
      if (u.fromStoryline && u.fromStoryline !== currentStoryline.id) return;
      const val = stats[u.stat];
      if (val === undefined) return;
      met = u.op === '>=' ? val >= u.value : val <= u.value;
    } else if (u.type === 'handled') {
      met = handled >= u.value;
    } else if (u.type === 'replied') {
      met = replied >= u.value;
    } else if (u.type === 'ending') {
      met = !!ENDING_REGISTRY.seen[u.endingId];
    } else if (u.type === 'behavior' && typeof u.fn === 'function') {
      met = u.fn(stats, handled, replied, replyLog);
    }
    if (met) {
      unlockedStorylines[id] = true;
      saveUnlocked();
      newly.push(sl);
    }
  });
  return newly;
}

function resolveWorldlineNext() {
  const slId = currentStoryline.id;
  for (const [wlId, wl] of Object.entries(WORLDLINES)) {
    const node = wl.nodes && wl.nodes[slId];
    if (!node) continue;
    const key = escapeType !== null ? escapeType : null;
    return key in node ? node[key] : node[null];
  }
  return null;
}

/* ===== END SCREEN: 结算与恭喜弹窗 ===== */
function endGame() {
  stopBgm();
  canClick = false;
  msgQueue = [];
  document.getElementById('msg-area').innerHTML = '';
  document.getElementById('skip-btn').style.display = 'none';

  escapeType = resolveEscapeType(currentStoryline);

  const cfg = activeStatCfg || STAT_CFG;
  const res = document.getElementById('end-results');
  res.innerHTML = '';

  const ending = resolveEnding(currentStoryline, stats, handled, replied, escapeType);
  if (ending) {
    ENDING_REGISTRY.record(ending.id);
    const eCard = document.createElement('div');
    eCard.className = 'ending-card';
    eCard.innerHTML = `<div class="ending-icon">${ending.icon}</div><div class="ending-title">${ending.title}</div><div class="ending-text">${ending.text.replace(/\n/g,'<br>')}</div>`;
    res.appendChild(eCard);
  }

  const sentences = [];
  Object.entries(stats).forEach(([k, v]) => {
    const c = cfg[k];
    if (!c) return;
    const hit = c.dir === 'max' ? v >= c.thresh : v <= c.thresh;
    if (c.sentence) {
      const delta = c.dir === 'max' ? v : (c.init - v);
      if (delta > 0) {
        sentences.push({ text: c.sentence.replace('{n}', delta), hit, story: c.story });
      }
    } else {
      const row = document.createElement('div');
      row.className = 'result-row' + (hit ? ' unlocked' : '');
      row.innerHTML = `
        <div class="result-left">
          <div class="result-name${hit ? ' red' : ''}">${c.label}</div>
          ${hit && c.story ? `<div class="result-unlock">${c.story} 已解锁</div>` : ''}
        </div>
        <div class="result-val">${v}${c.unit||''}</div>`;
      res.appendChild(row);
    }
  });
  sentences.push({ text: '你回了' + handled + '条。', hit: false });

  if (sentences.length > 0) {
    const block = document.createElement('div');
    block.className = 'result-row sentence-block';
    block.innerHTML = sentences.map(s =>
      `<div class="sentence-line${s.hit ? ' red' : ''}">${s.text}</div>`
    ).join('');
    res.appendChild(block);
  }

  const newlyUnlocked = checkStorylineUnlocks();
  newlyUnlocked.forEach(sl => {
    const row = document.createElement('div');
    row.className = 'result-row unlocked';
    row.innerHTML = `<div class="result-left"><div class="result-name red">${sl.name}</div><div class="result-unlock">已解锁</div></div><button class="enter-storyline-btn" onclick="startGame('${sl.id}')">进入</button>`;
    res.appendChild(row);
  });

  if (intrusionConfig && intrusionConfig.id === 'ANDROID_INTRUSION') {
    // 伪人乱入：无论是否触发，都显示专属结局卡（不显示「故事继续」按钮）
    const ae = intrusionConfig.androidEndings;
    const androidEnding = ae ? (intrusionTriggered ? ae[1] : ae[0]) : null;
    if (androidEnding) {
      ENDING_REGISTRY.record(androidEnding.id);
      const eCard = document.createElement('div');
      eCard.className = 'ending-card';
      eCard.innerHTML = `<div class="ending-icon">${androidEnding.icon}</div><div class="ending-title">${androidEnding.title}</div><div class="ending-text">${androidEnding.text.replace(/\n/g,'<br>')}</div>`;
      res.insertBefore(eCard, res.firstChild);
    }
  } else if (intrusionTriggered && intrusionConfig) {
    const target = intrusionConfig.worldlineTarget;
    if (target && STORYLINES[target]) {
      const row = document.createElement('div');
      row.className = 'result-row unlocked';
      row.innerHTML = `<div class="result-left"><div class="result-name red">${STORYLINES[target].name}</div><div class="result-unlock">信号接通</div></div><button class="enter-storyline-btn" onclick="startGame('${target}')">继续</button>`;
      res.appendChild(row);
    }
  } else {
    const nextSl = resolveWorldlineNext();
    if (nextSl && nextSl !== 'MAIN' && STORYLINES[nextSl]) {
      const row = document.createElement('div');
      row.className = 'result-row unlocked';
      row.innerHTML = `<div class="result-left"><div class="result-name red">${STORYLINES[nextSl].name}</div><div class="result-unlock">故事继续</div></div><button class="enter-storyline-btn" onclick="startGame('${nextSl}')">继续</button>`;
      res.appendChild(row);
    }
  }

  const progressEl = document.createElement('div');
  progressEl.className = 'ending-progress';
  progressEl.textContent = '结局收集 ' + ENDING_REGISTRY.totalUnique() + ' / ' + ENDING_REGISTRY.totalPossible();
  res.appendChild(progressEl);

  document.getElementById('share-card').innerHTML =
    currentStoryline.id === 'MAIN'
    ? `外卖丢了 <b>${stats.DELIVERY_LOST||0}</b> 单 &nbsp;/&nbsp; 老板耐心剩 <b>${stats.BOSS_PATIENCE||0}</b>% &nbsp;/&nbsp; 泄露了 <b>${stats.INFO_LEAK||0}</b> 次信息<br><span style="color:#555;font-size:12px;margin-top:4px;display:block">你能比我强吗？</span>`
    : `<b>${currentStoryline.name}</b><br><span style="color:#555;font-size:12px;margin-top:4px;display:block">${ending ? ending.title : '一分钟结束了'}</span>`;

  document.getElementById('end-screen').className = 'show';
  document.querySelector('.end-title').textContent = currentStoryline.name;

  const restartBtn = document.getElementById('restart-btn');
  if (demoMode) {
    const hasNext = demoIndex + 1 < demoSequence.length;
    if (hasNext) {
      restartBtn.textContent = '下一段';
      restartBtn.onclick = () => { demoIndex++; startGame(demoSequence[demoIndex].id); };
    } else {
      restartBtn.textContent = '演示结束';
      restartBtn.onclick = () => { demoMode = false; demoIndex = 0; restoreMainStartScreen(); document.getElementById('end-screen').className = ''; document.getElementById('start-screen').style.display = 'flex'; };
    }
  } else {
    restartBtn.textContent = '再来一局';
    restartBtn.onclick = restart;
  }
}

function showCongrats() {
  document.getElementById('msg-area').innerHTML = '';
  document.getElementById('congrats-modal').className = 'show';
}

function dismissCongrats() {
  document.getElementById('congrats-modal').className = '';
  endGame();
}

function startDemoMode() {
  demoMode = true;
  demoIndex = 0;
  startGame(demoSequence[0].id);
}

function restart() {
  demoMode = false;
  const btn = document.getElementById('start-btn');
  btn.textContent = '开始一分钟';
  btn.onclick = () => startGame('MAIN');
  startGame('MAIN');
}

function showImportModal() {
  document.getElementById('import-modal').style.display = 'block';
  document.getElementById('import-error').textContent = '';
}
function hideImportModal() {
  document.getElementById('import-modal').style.display = 'none';
}
function parseCustomMessages(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 3) return { error: '至少需要3条消息' };
  const cards = lines.slice(0, 30).map(line => {
    const sepFull = line.indexOf('：');
    const sepHalf = line.indexOf(':');
    const idx = sepFull !== -1 ? sepFull : (sepHalf !== -1 ? sepHalf : -1);
    if (idx > 0 && idx < line.length - 1) {
      return { senderName: line.slice(0, idx).trim(), body: line.slice(idx + 1).trim() };
    }
    return { senderName: '未知', body: line };
  });
  return { cards, truncated: text.split('\n').filter(l => l.trim()).length > 30 };
}
function createCustomStoryline(cards) {
  return {
    id: '__CUSTOM__',
    name: '我的消息',
    intro: '一分钟。\n你的手机里有这些消息。\n（它们都在等你。）',
    statCfg: {},
    defaults: {},
    rules: [],
    raw: cards.map(c => ({ t: 'CUSTOM', n: c.senderName, b: c.body, correct: 'RECEIVED', e: {} })),
    tmpl: {},
    genCount: 0,
    ui: {
      batteryText: '消息',
      buttons: { WAIT: '等等', RECEIVED: '已读', UNSUBSCRIBE: '不回', LOVE: '在的' },
    },
    endings: [
      { id: 'CUSTOM_E01', title: '看完了', icon: '📱', text: '这一分钟过去了。\n那些消息还在。\n（有几条你其实没想好怎么回。）', priority: 1, condition: () => true },
    ],
  };
}
function startCustomGame() {
  const text = document.getElementById('import-textarea').value;
  const result = parseCustomMessages(text);
  if (result.error) {
    document.getElementById('import-error').textContent = result.error;
    return;
  }
  if (result.truncated) {
    document.getElementById('import-error').textContent = '超过30条，已截取前30条。';
  }
  STORYLINES['__CUSTOM__'] = createCustomStoryline(result.cards);
  hideImportModal();
  startGame('__CUSTOM__');
}

function restoreMainStartScreen() {
  const screen = document.getElementById('start-screen');
  screen.querySelector('.start-battery').textContent = '🪫';
  screen.querySelector('.start-title').textContent = '今天不想回消息';
  screen.querySelector('.start-sub').innerHTML =
    '昨晚有停电通知。你没看到。<br><br>醒来已经晚了，手机剩 <em>1%</em> 电。<br>老板在催，同事在问，快递等你开门禁，<br>你用 claw 自动订的早饭和咖啡刚到楼下，<br>还有几个你叫不出名字但号码眼熟的来电。<br><br>预存了四条回复。<br>在找到充电器之前，先用它们把消息处理完。<br><br><span class="start-sub-note">（应该够用的。）</span>';
  const btn = document.getElementById('start-btn');
  btn.textContent = '开始一分钟';
  btn.onclick = () => startGame('MAIN');
}
